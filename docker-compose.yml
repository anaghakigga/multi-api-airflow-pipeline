version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_metadata_db/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""
    # Connection Airflow uses inside the DAG (postgres_conn_id="warehouse_postgres")
    AIRFLOW_CONN_WAREHOUSE_POSTGRES: postgres://warehouse:warehouse@warehouse_db:5432/warehouse
    _PIP_ADDITIONAL_REQUIREMENTS: "requests==2.31.0"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    - airflow_metadata_db
    - warehouse_db

services:
  # Airflow's own internal metadata DB (DAG runs, task state, users, etc.)
  airflow_metadata_db:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_metadata_data:/var/lib/postgresql/data

  # The actual data warehouse the pipeline loads into
  warehouse_db:
    image: postgres:15
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: warehouse
    ports:
      - "5433:5432"   # host:container -> connect locally on 5433
    volumes:
      - warehouse_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create
        --username admin --password admin
        --firstname Anagha --lastname DE
        --role Admin --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

volumes:
  airflow_metadata_data:
  warehouse_data:
